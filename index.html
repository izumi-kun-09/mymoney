<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0f0f0f"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="My Money"/>
<meta name="description" content="Personal money manager"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>My Money</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f0f;
  --surface:#1a1a1a;
  --surface2:#242424;
  --border:#2e2e2e;
  --text:#f0f0f0;
  --muted:#888;
  --hint:#555;
  --green:#22c97e;
  --green-dim:#0d3d26;
  --red:#f05c5c;
  --red-dim:#3d1515;
  --amber:#f0b429;
  --amber-dim:#3d2e0a;
  --radius:14px;
  --radius-sm:10px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:16px}
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}

/* STATUS BAR AREA */
.status-bar{height:8px}

/* HEADER */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 8px}
.topbar-title{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.topbar-date{font-size:13px;color:var(--muted)}

/* HERO BALANCE */
.hero{padding:8px 20px 20px;text-align:center}
.hero-label{font-size:13px;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px}
.hero-amount{font-size:52px;font-weight:700;letter-spacing:-2px;color:var(--green);line-height:1}
.hero-amount.neg{color:var(--red)}
.hero-sub{display:flex;gap:24px;justify-content:center;margin-top:14px}
.hero-stat{text-align:center}
.hero-stat-val{font-size:18px;font-weight:600;letter-spacing:-0.5px}
.hero-stat-val.red{color:var(--red)}
.hero-stat-val.green{color:var(--green)}
.hero-stat-lbl{font-size:11px;color:var(--muted);margin-top:2px;letter-spacing:0.3px;text-transform:uppercase}
.divider-dot{width:4px;height:4px;border-radius:50%;background:var(--border);align-self:center}

/* SPEND BAR */
.spend-bar-wrap{padding:0 20px 16px}
.spend-bar-track{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.spend-bar-fill{height:100%;background:var(--red);border-radius:2px;transition:width 0.4s cubic-bezier(.4,0,.2,1)}
.spend-bar-lbl{display:flex;justify-content:space-between;margin-top:5px}
.spend-bar-lbl span{font-size:11px;color:var(--hint)}

/* SCROLL CONTENT */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px}
.scroll-area::-webkit-scrollbar{display:none}

/* SECTION HEADER */
.section-hd{font-size:11px;color:var(--muted);letter-spacing:0.6px;text-transform:uppercase;padding:0 4px;margin:16px 0 8px}

/* ENTRY CARD */
.entry-card{background:var(--surface);border-radius:var(--radius);margin-bottom:8px;overflow:hidden}
.entry-item{display:flex;align-items:center;padding:14px 16px;gap:12px}
.entry-item+.entry-item{border-top:1px solid var(--border)}
.entry-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.entry-icon.exp{background:var(--red-dim)}
.entry-icon.inc{background:var(--green-dim)}
.entry-body{flex:1;min-width:0}
.entry-desc{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-time{font-size:12px;color:var(--muted);margin-top:2px}
.entry-amt{font-size:17px;font-weight:600;flex-shrink:0}
.entry-amt.exp{color:var(--red)}
.entry-amt.inc{color:var(--green)}
.entry-del{padding:6px;color:var(--hint);font-size:18px;background:none;border:none;cursor:pointer;margin-left:4px}

/* EMPTY STATE */
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-state p{font-size:15px;margin-top:8px}

/* FUND ADJUSTMENTS */
.fund-adj{background:var(--surface);border-radius:var(--radius);padding:4px 0;margin-bottom:16px}
.fund-adj-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;gap:10px}
.fund-adj-row+.fund-adj-row{border-top:1px solid var(--border)}
.fund-adj-time{font-size:12px;color:var(--muted);min-width:60px}
.fund-adj-msg{font-size:14px;flex:1}
.fund-adj-res{font-size:14px;font-weight:600;color:var(--green)}

/* HISTORY */
.history-day{background:var(--surface);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.history-day-hd{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border)}
.history-day-label{font-size:14px;font-weight:600}
.history-day-net{font-size:14px;font-weight:600}
.history-day-net.pos{color:var(--green)}
.history-day-net.neg{color:var(--red)}
.history-day-row{display:flex;justify-content:space-between;padding:10px 16px}
.history-day-row+.history-day-row{border-top:1px solid var(--border)}
.history-sub{font-size:13px;color:var(--muted)}
.history-val{font-size:13px;font-weight:500}

/* BOTTOM NAV */
.bottom-nav{display:flex;background:var(--surface);border-top:1px solid var(--border);padding-bottom:var(--safe-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;border:none;background:none;cursor:pointer;color:var(--muted);gap:4px;font-size:11px;letter-spacing:0.2px}
.nav-btn svg{width:24px;height:24px;stroke-width:1.8}
.nav-btn.active{color:var(--green)}

/* FAB */
.fab-wrap{position:fixed;right:20px;bottom:calc(72px + var(--safe-bottom));z-index:10}
.fab{width:56px;height:56px;border-radius:50%;background:var(--green);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#0f0f0f;font-size:28px;font-weight:300;box-shadow:0 4px 20px rgba(34,201,126,0.35);transition:transform 0.15s}
.fab:active{transform:scale(0.93)}

/* SHEET / MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:20;opacity:0;pointer-events:none;transition:opacity 0.25s;backdrop-filter:blur(4px)}
.overlay.open{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:24px 24px 0 0;padding:0 20px;padding-bottom:calc(28px + var(--safe-bottom));z-index:30;transform:translateY(110%);transition:transform 0.3s cubic-bezier(.4,0,.2,1)}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 20px}
.sheet-title{font-size:18px;font-weight:600;margin-bottom:20px;text-align:center}

/* FORM ELEMENTS */
.field{margin-bottom:14px}
.field label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:6px}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 14px;font-size:16px;color:var(--text);outline:none;-webkit-appearance:none}
.field input:focus{border-color:var(--green)}
.type-row{display:flex;gap:10px;margin-bottom:16px}
.type-btn{flex:1;padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.15s}
.type-btn.sel-exp{background:var(--red-dim);border-color:var(--red);color:var(--red)}
.type-btn.sel-inc{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.submit-btn{width:100%;padding:15px;border-radius:var(--radius);border:none;background:var(--green);color:#0f0f0f;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px;transition:opacity 0.15s}
.submit-btn:active{opacity:0.8}
.fund-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:4px}
.fund-act-btn{padding:13px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;font-weight:500;cursor:pointer}
.fund-act-btn:active{opacity:0.7}
.fund-act-btn.set{border-color:var(--amber);color:var(--amber);background:var(--amber-dim)}
.fund-act-btn.add{border-color:var(--green);color:var(--green);background:var(--green-dim)}
.fund-act-btn.sub{border-color:var(--red);color:var(--red);background:var(--red-dim)}

/* TOAST */
.toast{position:fixed;top:calc(var(--safe-top) + 60px);left:50%;transform:translateX(-50%) translateY(-10px);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 18px;border-radius:40px;font-size:13px;opacity:0;transition:all 0.25s;z-index:99;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* BUDGET TABLE */
.budget-name-input{font-size:14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text);outline:none;width:100%}
.budget-name-input:focus{border-color:var(--green)}
.budget-num-input{font-size:14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 6px;color:var(--text);outline:none;width:100%;text-align:right;-webkit-appearance:none}
.budget-num-input:focus{border-color:var(--green)}
.budget-wrap{background:var(--surface);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.budget-table{width:100%;border-collapse:collapse;table-layout:fixed}
.budget-table th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;padding:10px 8px;text-align:right;border-bottom:1px solid var(--border);font-weight:500}
.budget-table th:first-child{text-align:left}
.budget-table td{padding:5px 4px;vertical-align:middle;border-bottom:1px solid var(--border)}
.budget-table tr:last-child td{border-bottom:none}
.del-row-btn{background:none;border:none;cursor:pointer;color:var(--hint);font-size:15px;padding:4px 6px;line-height:1}
.del-row-btn:active{color:var(--red)}
.add-row-btn{display:flex;align-items:center;gap:8px;padding:13px 16px;font-size:14px;color:var(--green);background:none;border:none;cursor:pointer;width:100%;border-top:1px solid var(--border)}
.budget-total-row td{padding:11px 8px;font-weight:600;font-size:14px;background:var(--surface2)}
.budget-total-amt{text-align:right;color:var(--amber)}
.budget-summary-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
</style>
</head>
<body>
<div id="app">
  <div class="status-bar"></div>

  <div class="topbar">
    <span class="topbar-title">My Money</span>
    <span class="topbar-date" id="top-date"></span>
  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-label">Fund balance</div>
    <div class="hero-amount" id="hero-fund">৳0</div>
    <div class="hero-sub">
      <div class="hero-stat">
        <div class="hero-stat-val red" id="hero-spent">৳0</div>
        <div class="hero-stat-lbl">Spent today</div>
      </div>
      <div class="divider-dot"></div>
      <div class="hero-stat">
        <div class="hero-stat-val green" id="hero-earned">৳0</div>
        <div class="hero-stat-lbl">Earned today</div>
      </div>
    </div>
  </div>

  <div class="spend-bar-wrap" id="bar-wrap" style="display:none">
    <div class="spend-bar-track"><div class="spend-bar-fill" id="bar-fill" style="width:0%"></div></div>
    <div class="spend-bar-lbl"><span>Daily spend</span><span id="bar-pct">0%</span></div>
  </div>

  <!-- SCROLLABLE -->
  <div class="scroll-area" id="scroll-area">
    <!-- TAB: TODAY -->
    <div id="tab-today">
      <div class="section-hd" id="today-hd">Today's entries</div>
      <div id="entry-list"></div>
    </div>

    <!-- TAB: FUND -->
    <div id="tab-fund" style="display:none">
      <div class="section-hd">Adjust fund</div>
      <div class="field">
        <label>Amount (৳)</label>
        <input type="number" id="fund-input" placeholder="0" inputmode="decimal"/>
      </div>
      <div class="fund-btns">
        <button class="fund-act-btn set" onclick="adjustFund('set')">Set</button>
        <button class="fund-act-btn add" onclick="adjustFund('add')">+ Add</button>
        <button class="fund-act-btn sub" onclick="adjustFund('sub')">− Deduct</button>
      </div>
      <div class="section-hd" style="margin-top:24px">Fund log</div>
      <div id="fund-log"></div>
    </div>

    <!-- TAB: BUDGET -->
    <div id="tab-budget" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin:16px 4px 8px">
        <div class="section-hd" style="margin:0">Budget planner</div>
        <button onclick="exportBudgetCSV()" style="display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export
        </button>
      </div>
      <div class="budget-summary-cards" id="budget-summary-cards"></div>
      <div class="budget-wrap">
        <table class="budget-table">
          <colgroup>
            <col style="width:36%"/>
            <col style="width:14%"/>
            <col style="width:22%"/>
            <col style="width:22%"/>
            <col style="width:6%"/>
          </colgroup>
          <thead>
            <tr>
              <th style="text-align:left;padding-left:14px">Aspect</th>
              <th style="text-align:right">#</th>
              <th style="text-align:right">Unit ৳</th>
              <th style="text-align:right">Total ৳</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="budget-tbody"></tbody>
        </table>
        <button class="add-row-btn" onclick="addBudgetRow()">+ Add row</button>
      </div>
    </div>

    <!-- TAB: HISTORY -->
    <div id="tab-history" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin:16px 4px 8px">
        <div class="section-hd" style="margin:0">Past 14 days</div>
        <button onclick="exportCSV()" style="display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export CSV
        </button>
      </div>
      <div id="history-list"></div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-today" onclick="switchTab('today',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      Today
    </button>
    <button class="nav-btn" id="nav-fund" onclick="switchTab('fund',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      Fund
    </button>
    <button class="nav-btn" id="nav-budget" onclick="switchTab('budget',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      Budget
    </button>
    <button class="nav-btn" id="nav-history" onclick="switchTab('history',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12h18M3 6h18M3 18h12"/></svg>
      History
    </button>
  </nav>
</div>

<!-- FAB -->
<div class="fab-wrap" id="fab-wrap">
  <button class="fab" onclick="openSheet()" aria-label="Add entry">+</button>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeSheet()"></div>

<!-- ADD ENTRY SHEET -->
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">New entry</div>
  <div class="type-row">
    <button class="type-btn sel-exp" id="btn-exp" onclick="setType('exp')">− Expense</button>
    <button class="type-btn" id="btn-inc" onclick="setType('inc')">+ Income</button>
  </div>
  <div class="field">
    <label>Description</label>
    <input type="text" id="desc-input" placeholder="e.g. Lunch, Rickshaw..." autocomplete="off"/>
  </div>
  <div class="field">
    <label>Amount (৳)</label>
    <input type="number" id="amt-input" placeholder="0" inputmode="decimal"/>
  </div>
  <button class="submit-btn" onclick="addEntry()">Save entry</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const FMT = n => '৳' + Math.abs(Number(n)).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',');
let state = {fund:0,entries:{},fundLog:[],budgetRows:[]};
let entryType = 'exp';
let currentTab = 'today';

function todayKey(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function todayEntries(){return state.entries[todayKey()]||[]}
function setTodayEntries(arr){state.entries[todayKey()]=arr}

function load(){
  try{const s=localStorage.getItem('mymoney_v2');if(s){state=JSON.parse(s);if(!state.entries)state.entries={};if(!state.fundLog)state.fundLog=[];}}catch(e){}
}
function save(){localStorage.setItem('mymoney_v2',JSON.stringify(state))}

function setType(t){
  entryType=t;
  document.getElementById('btn-exp').className='type-btn'+(t==='exp'?' sel-exp':'');
  document.getElementById('btn-inc').className='type-btn'+(t==='inc'?' sel-inc':'');
}

function openSheet(){
  document.getElementById('overlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  setTimeout(()=>document.getElementById('desc-input').focus(),300);
}
function closeSheet(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}

function addEntry(){
  const desc=document.getElementById('desc-input').value.trim();
  const amt=parseFloat(document.getElementById('amt-input').value);
  if(!desc||isNaN(amt)||amt<=0){toast('Fill in description and amount');return;}
  const entries=todayEntries();
  entries.push({id:Date.now(),desc,amt,type:entryType,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});
  setTodayEntries(entries);
  if(entryType==='exp')state.fund=state.fund-amt;
  else state.fund+=amt;
  save();
  document.getElementById('desc-input').value='';
  document.getElementById('amt-input').value='';
  closeSheet();
  toast(entryType==='exp'?'Expense saved':'Income saved');
  render();
}

function deleteEntry(id){
  const entries=todayEntries();
  const idx=entries.findIndex(e=>e.id===id);
  if(idx===-1)return;
  const e=entries[idx];
  if(e.type==='exp')state.fund+=e.amt;
  else state.fund-=e.amt;
  entries.splice(idx,1);
  setTodayEntries(entries);
  save();
  render();
}

function adjustFund(op){
  const v=parseFloat(document.getElementById('fund-input').value);
  if(isNaN(v)||v<0){toast('Enter a valid amount');return;}
  let msg='';
  if(op==='set'){state.fund=v;msg='Set to '+FMT(v);}
  else if(op==='add'){state.fund+=v;msg='Added '+FMT(v);}
  else if(op==='sub'){state.fund-=v;msg='Deducted '+FMT(v);}
  state.fundLog.unshift({msg,time:new Date().toLocaleString('en-BD',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}),result:state.fund});
  if(state.fundLog.length>40)state.fundLog=state.fundLog.slice(0,40);
  save();
  document.getElementById('fund-input').value='';
  toast(msg);
  render();
}

function switchTab(name,el){
  currentTab=name;
  ['today','fund','budget','history'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===name?'block':'none';
  });
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('fab-wrap').style.display=name==='today'?'block':'none';
  document.getElementById('scroll-area').scrollTop=0;
  if(name==='budget')renderBudget();
  render();
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2000);
}

function catIcon(type){
  return type==='exp'?'💸':'💰';
}

function render(){
  const entries=todayEntries();
  const spent=entries.filter(e=>e.type==='exp').reduce((s,e)=>s+e.amt,0);
  const earned=entries.filter(e=>e.type==='inc').reduce((s,e)=>s+e.amt,0);

  const fundEl=document.getElementById('hero-fund');
  fundEl.textContent=FMT(state.fund);
  fundEl.className='hero-amount'+(state.fund<0?' neg':'');
  document.getElementById('hero-spent').textContent=FMT(spent);
  document.getElementById('hero-earned').textContent=FMT(earned);

  const now=new Date();
  document.getElementById('top-date').textContent=now.toLocaleDateString('en-BD',{weekday:'short',month:'short',day:'numeric'});

  if(spent>0&&(state.fund+spent)>0){
    const pct=Math.min(100,Math.round(spent/(state.fund+spent)*100));
    document.getElementById('bar-wrap').style.display='block';
    document.getElementById('bar-fill').style.width=pct+'%';
    document.getElementById('bar-pct').textContent=pct+'%';
  } else {
    document.getElementById('bar-wrap').style.display='none';
  }

  // TODAY LIST
  const list=document.getElementById('entry-list');
  if(!entries.length){
    list.innerHTML=`<div class="empty-state"><div style="font-size:36px">📋</div><p>No entries yet.<br/>Tap + to add your first one.</p></div>`;
  } else {
    list.innerHTML=`<div class="entry-card">`+[...entries].reverse().map(e=>`
      <div class="entry-item">
        <div class="entry-icon ${e.type}">${catIcon(e.type)}</div>
        <div class="entry-body">
          <div class="entry-desc">${e.desc}</div>
          <div class="entry-time">${e.time}</div>
        </div>
        <div class="entry-amt ${e.type}">${e.type==='exp'?'−':'+'}${FMT(e.amt)}</div>
        <button class="entry-del" onclick="deleteEntry(${e.id})" aria-label="Delete">✕</button>
      </div>`).join('')+`</div>`;
  }

  // FUND LOG
  const flog=document.getElementById('fund-log');
  if(!state.fundLog.length){
    flog.innerHTML=`<div class="empty-state" style="padding:20px"><p>No adjustments yet</p></div>`;
  } else {
    flog.innerHTML=`<div class="fund-adj">`+state.fundLog.map(l=>`
      <div class="fund-adj-row">
        <span class="fund-adj-time">${l.time}</span>
        <span class="fund-adj-msg">${l.msg}</span>
        <span class="fund-adj-res">${FMT(l.result)}</span>
      </div>`).join('')+`</div>`;
  }

  // BUDGET (render only when visible)
  if(currentTab==='budget')renderBudget();

  // HISTORY
  const hlist=document.getElementById('history-list');
  const days=Object.keys(state.entries).sort().reverse().slice(0,14);
  const today=todayKey();
  if(!days.length){
    hlist.innerHTML=`<div class="empty-state"><p>No history yet</p></div>`;
  } else {
    hlist.innerHTML=days.map(day=>{
      const es=state.entries[day];
      const s=es.filter(e=>e.type==='exp').reduce((x,e)=>x+e.amt,0);
      const i=es.filter(e=>e.type==='inc').reduce((x,e)=>x+e.amt,0);
      const net=i-s;
      const lbl=day===today?'Today':new Date(day+'T00:00:00').toLocaleDateString('en-BD',{weekday:'short',month:'short',day:'numeric'});
      return `<div class="history-day">
        <div class="history-day-hd">
          <span class="history-day-label">${lbl}</span>
          <span class="history-day-net ${net>=0?'pos':'neg'}">${net>=0?'+':''}${FMT(net)}</span>
        </div>
        <div class="history-day-row"><span class="history-sub">Spent</span><span class="history-val" style="color:var(--red)">−${FMT(s)}</span></div>
        ${i>0?`<div class="history-day-row"><span class="history-sub">Earned</span><span class="history-val" style="color:var(--green)">+${FMT(i)}</span></div>`:''}
        <div class="history-day-row"><span class="history-sub">${es.length} entr${es.length===1?'y':'ies'}</span><span class="history-val" style="color:var(--muted)">net</span></div>
      </div>`;
    }).join('');
  }
}

function addBudgetRow(aspect='',qty=1,unitExp=0){
  state.budgetRows.push({id:Date.now()+Math.random(),aspect,qty,unitExp});
  save();renderBudget();
}

function updateBudgetRow(id,field,val){
  const row=state.budgetRows.find(r=>r.id===id);
  if(!row)return;
  if(field==='qty')row.qty=parseFloat(val)||0;
  else if(field==='unitExp')row.unitExp=parseFloat(val)||0;
  else if(field==='aspect')row.aspect=val;
  save();renderBudgetTotal();
}

function deleteBudgetRow(id){
  state.budgetRows=state.budgetRows.filter(r=>r.id!==id);
  save();renderBudget();
}

function renderBudgetTotal(){
  const total=state.budgetRows.reduce((s,r)=>s+(r.qty*r.unitExp),0);
  document.getElementById('budget-grand-total').textContent=total.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',');
  renderBudgetSummary(total);
}

function renderBudgetSummary(total){
  const cards=document.getElementById('budget-summary-cards');
  if(!cards)return;
  const count=state.budgetRows.length;
  cards.innerHTML=`
    <div class="stat"><div class="stat-label">Total budget</div><div class="stat-value" style="color:var(--amber)">৳${Number(total).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',')}</div></div>
    <div class="stat"><div class="stat-label">Line items</div><div class="stat-value">${count}</div></div>`;
}

function renderBudget(){
  const tbody=document.getElementById('budget-tbody');
  if(!tbody)return;
  if(!state.budgetRows.length){
    tbody.innerHTML=`<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--muted);font-size:14px">No rows yet — tap "+ Add row"</td></tr>`;
    renderBudgetSummary(0);
    const tot=document.getElementById('budget-grand-total');
    if(tot)tot.textContent='0';
    return;
  }
  const rows=state.budgetRows.map(r=>{
    const total=(r.qty||0)*(r.unitExp||0);
    return `<tr>
      <td style="padding:5px 4px 5px 10px"><input class="budget-name-input" value="${r.aspect.replace(/"/g,'&quot;')}" placeholder="Aspect" oninput="updateBudgetRow(${r.id},'aspect',this.value)" /></td>
      <td style="padding:5px 4px"><input class="budget-num-input" type="number" value="${r.qty}" min="0" step="any" oninput="updateBudgetRow(${r.id},'qty',this.value)" /></td>
      <td style="padding:5px 4px"><input class="budget-num-input" type="number" value="${r.unitExp}" min="0" step="any" oninput="updateBudgetRow(${r.id},'unitExp',this.value)" /></td>
      <td style="padding:5px 8px 5px 4px;text-align:right;font-size:14px;font-weight:600;color:var(--amber)">${total.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',')}</td>
      <td style="padding:5px 6px"><button class="del-row-btn" onclick="deleteBudgetRow(${r.id})" aria-label="Delete row">✕</button></td>
    </tr>`;
  }).join('');
  const grandTotal=state.budgetRows.reduce((s,r)=>s+(r.qty*r.unitExp),0);
  tbody.innerHTML=rows+`<tr class="budget-total-row">
    <td style="padding-left:10px;color:var(--muted);font-size:13px" colspan="3">Grand total</td>
    <td class="budget-total-amt" style="padding-right:8px" id="budget-grand-total">${grandTotal.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',')}</td>
    <td></td>
  </tr>`;
  renderBudgetSummary(grandTotal);
}

function exportBudgetCSV(){
  if(!state.budgetRows.length){toast('No budget rows to export');return;}
  const rows=[['Aspect','Quantity','Unit Expense (BDT)','Total Expense (BDT)']];
  state.budgetRows.forEach(r=>{
    rows.push(['"'+r.aspect.replace(/"/g,'""')+'"',r.qty,r.unitExp.toFixed(2),(r.qty*r.unitExp).toFixed(2)]);
  });
  const grand=state.budgetRows.reduce((s,r)=>s+(r.qty*r.unitExp),0);
  rows.push(['Grand Total','','',grand.toFixed(2)]);
  const csv=rows.map(r=>r.join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='budget-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  URL.revokeObjectURL(url);
  toast('Budget exported!');
}


function exportCSV(){
  const allDays=Object.keys(state.entries).sort();
  if(!allDays.length){toast('No data to export');return;}
  const rows=[['Date','Time','Description','Type','Amount (BDT)']];
  allDays.forEach(day=>{
    (state.entries[day]||[]).forEach(e=>{
      rows.push([day, e.time||'', '"'+e.desc.replace(/"/g,'""')+'"', e.type==='exp'?'Expense':'Income', e.amt.toFixed(2)]);
    });
  });
  // Fund log
  rows.push([]);
  rows.push(['--- Fund Log ---']);
  rows.push(['Timestamp','Action','Balance After']);
  (state.fundLog||[]).forEach(l=>{
    rows.push(['"'+l.time+'"','"'+l.msg+'"',Number(l.result).toFixed(2)]);
  });
  const csv=rows.map(r=>r.join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='mymoney-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  URL.revokeObjectURL(url);
  toast('CSV downloaded!');
}

// Enter key shortcuts
document.getElementById('desc-input').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('amt-input').focus()});
document.getElementById('amt-input').addEventListener('keydown',e=>{if(e.key==='Enter')addEntry()});

load();render();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}
</script>
